# Path settings
shared_folder: "/path/to/your/SHARED_FOLDER" # Replace with your actual Manjaro host path

# Window settings
window:
  width: 600
  height: 150
  position_x: 100 # Pixel offset from the left of the screen
  position_y: 100 # Pixel offset from the top of the screen
  always_on_top: true

# Activity settings
activity_timeout: 10 # Seconds an agent remains "active" after a file modification
